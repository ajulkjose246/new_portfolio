<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajul K Jose - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Add Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <h1>Ajul K Jose</h1>
        
    </header>

    <main class="main-content">
        <div class="side-panel left-panel">
            <div class="panel-content">
                <h2>Quick Info</h2>
                <div class="info-item">
                    <i class="fas fa-code"></i>
                    <span>Full Stack Developer</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-graduation-cap"></i>
                    <span>B.Tech CSE Student</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <span>Kerala, India</span>
                </div>
            </div>
        </div>

        <div class="terminal">
            <div class="terminal-header">
                <div class="controls">
                    <span class="control close"></span>
                    <span class="control minimize"></span>
                    <span class="control maximize"></span>
                </div>
                <div class="title">portfolio.exe</div>
            </div>
            <div class="terminal-body" id="terminal-body">
                <div class="line">
                    <span class="prompt">visitor@portfolio:~$</span>
                    <span class="command">whoami</span>
                </div>
                <div class="output">
                    John Doe - Full Stack Developer
                </div>
                <div class="line">
                    <span class="prompt">visitor@portfolio:~$</span>
                    <span class="command-wrapper">
                        <span id="current-command" class="command"></span>
                        <span class="cursor">█</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="side-panel right-panel">
            <div class="panel-content">
                <h2>Latest Projects</h2>
                <div class="project-item">
                    <i class="fas fa-project-diagram"></i>
                    <span>Attendance Management</span>
                </div>
                <div class="project-item">
                    <i class="fas fa-shopping-cart"></i>
                    <span>E-Commerce Website</span>
                </div>
                <div class="project-item">
                    <i class="fas fa-users"></i>
                    <span>Student Management</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="social-links">
            <a href="https://github.com/ajulkjose" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://linkedin.com/in/ajul-k-jose" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="https://instagram.com/ajul_k_jose" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
        <div class="copyright">
            © 2024 Ajul K Jose. All rights reserved.
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
